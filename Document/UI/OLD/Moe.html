<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>萌えサイバーUI 素材カタログ</title>
    <style>
        /* 全体の背景（キャプチャ時に見やすくするため。Unityにはいかない） */
        body {
            background-color: #2b2b2b;
            color: #ffffff;
            font-family: 'MS PGothic', 'ＭＳ Ｐゴシック', sans-serif;
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: flex-start;
        }

        /* 共通の立体枠（凸・凹） */
        .border-outset {
            border-top: 3px solid #ffffff;
            border-left: 3px solid #ffffff;
            border-right: 3px solid #ff1493;
            border-bottom: 3px solid #ff1493;
        }

        .border-inset {
            border-top: 3px solid #ff1493;
            border-left: 3px solid #ff1493;
            border-right: 3px solid #ffffff;
            border-bottom: 3px solid #ffffff;
        }

        .catalog-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label {
            font-size: 14px;
            font-weight: bold;
            color: #aaaaaa;
        }

        /* 1. ウィンドウ共通ベース */
        .moe-window {
            width: 300px;
            background-color: #ffe6f2;
            padding: 3px;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }

        .title-bar {
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .close-btn {
            background-color: #ff99cc;
            width: 16px;
            height: 16px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ウィンドウの中身（背景パターンあり） */
        .content-pattern {
            padding: 15px;
            font-size: 14px;
            color: #cc0066;
            text-align: center;
            border: 2px dotted #ff66b2;
            margin-top: 3px;
            background-image: radial-gradient(#fff0f5 25%, transparent 25%);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        /* 何もない空のコンテンツ領域（Unity側で文字を載せる用の汎用素材） */
        .content-empty {
            height: 100px;
            border: 2px dotted #ff66b2;
            margin-top: 3px;
            background-image: radial-gradient(#fff0f5 25%, transparent 25%);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        /* ウィンドウのテーマカラー */
        .theme-default .title-bar {
            background: linear-gradient(90deg, #ff007f, #ffb3d9);
            text-shadow: 1px 1px #cc0066;
        }

        .theme-info .title-bar {
            background: linear-gradient(90deg, #00ccff, #99ebff);
            text-shadow: 1px 1px #0088cc;
        }

        .theme-warn .title-bar {
            background: linear-gradient(90deg, #ffaa00, #ffdd99);
            text-shadow: 1px 1px #cc6600;
        }

        .theme-error .title-bar {
            background: linear-gradient(90deg, #ff0000, #ff9999);
            text-shadow: 1px 1px #990000;
        }

        /* グリッチウィンドウ */
        .theme-glitch {
            background-color: #000000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            border-color: #ff0000 #660000 #660000 #ff0000;
        }

        .theme-glitch .title-bar {
            background: repeating-linear-gradient(45deg, #000, #000 5px, #ff0000 5px, #ff0000 10px);
            color: #fff;
            text-shadow: 2px 0px #00ffff, -2px 0px #ff00ff;
            letter-spacing: -2px;
        }

        .theme-glitch .content-pattern {
            background-color: #1a0000;
            border: 2px dashed #ff0000;
            color: #ff3333;
            background-image: none;
            text-shadow: 1px 0px #00ffff, -1px 0px #ff00ff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 2. 入力欄 */
        .moe-input {
            background-color: #ffffff;
            width: 250px;
            height: 30px;
            background-image: repeating-linear-gradient(transparent, transparent 2px, #fff0f5 3px, #fff0f5 3px);
        }

        /* 3. 吹き出し */
        .speech-bubble {
            background-color: #ffe6f2;
            padding: 15px;
            border: 2px dotted #ff66b2;
            position: relative;
            width: 200px;
            text-align: center;
            color: #cc0066;
            font-weight: bold;
            box-shadow: 2px 2px 0px #ff1493;
            min-height: 40px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: #ffe6f2 transparent transparent transparent;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 18px;
            border-width: 18px 18px 0 0;
            border-style: solid;
            border-color: #ff66b2 transparent transparent transparent;
            z-index: -1;
        }

        /* 4. ボタン */
        .moe-btn {
            background-color: #ff66b2;
            color: white;
            padding: 5px 15px;
            font-family: 'MS PGothic', sans-serif;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            text-align: center;
            width: 100px;
        }

        /* 5. プログレスバー */
        .progress-bg {
            width: 250px;
            height: 20px;
            background-color: #000000;
        }

        .progress-fill {
            width: 244px;
            height: 14px;
            background: linear-gradient(90deg, #ff007f, #ffb3d9);
        }
    </style>
</head>

<body>

    <div class="catalog-item">
        <span class="label">汎用ウィンドウ（文字はUnityで乗せる用）</span>
        <div class="moe-window border-outset theme-default">
            <div class="title-bar"><span>†┏┛ 絶 対 領 域 ┗┓†</span>
                <div class="close-btn border-outset">X</div>
            </div>
            <div class="content-empty"></div>
        </div>
    </div>

    <div class="catalog-item">
        <span class="label">Infoウィンドウ</span>
        <div class="moe-window border-outset theme-info">
            <div class="title-bar"><span>ℹ INFORMATION</span>
                <div class="close-btn border-outset">X</div>
            </div>
            <div class="content-empty"></div>
        </div>
    </div>

    <div class="catalog-item">
        <span class="label">Warningウィンドウ</span>
        <div class="moe-window border-outset theme-warn">
            <div class="title-bar"><span>⚠ WARNING</span>
                <div class="close-btn border-outset">X</div>
            </div>
            <div class="content-empty"></div>
        </div>
    </div>

    <div class="catalog-item">
        <span class="label">Errorウィンドウ</span>
        <div class="moe-window border-outset theme-error">
            <div class="title-bar"><span>❌ FATAL ERROR</span>
                <div class="close-btn border-outset">X</div>
            </div>
            <div class="content-empty"></div>
        </div>
    </div>

    <div class="catalog-item">
        <span class="label">バグ・グリッチウィンドウ（文字入りサンプル）</span>
        <div class="moe-window border-outset theme-glitch">
            <div class="title-bar"><span>h&2*! E R R O R #$%</span>
                <div class="close-btn border-outset">X</div>
            </div>
            <div class="content-pattern">
                0x00000000<br>ﾀｽｹﾃ...<br>1nv@lid_p0int3r_#%&
            </div>
        </div>
    </div>

    <div class="catalog-item">
        <span class="label">入力欄（空）</span>
        <div class="moe-input border-inset"></div>
    </div>

    <div class="catalog-item">
        <span class="label">汎用ボタン（空）</span>
        <div class="moe-btn border-outset"></div>
    </div>

    <div class="catalog-item">
        <span class="label">吹き出し（空）</span>
        <div class="speech-bubble"></div>
    </div>

    <div class="catalog-item">
        <span class="label">プログレスバー（①外枠）</span>
        <div class="progress-bg border-inset"></div>
    </div>

    <div class="catalog-item">
        <span class="label">プログレスバー（②中身）</span>
        <div class="progress-fill"></div>
    </div>

</body>

</html>
