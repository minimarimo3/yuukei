<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Angel UI 素材カタログ</title>
  <style>

/* ===== 共通（Moe.html 互換の構造）===== */
body {
  background-color: #2b2b2b;
  color: #ffffff;
  font-family: 'MS PGothic', 'ＭＳ Ｐゴシック', sans-serif;
  padding: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  align-items: flex-start;
}

/* 立体枠：テーマごとに CSS 変数で色を差し替える */
:root{
  --hi: #ffffff;   /* ハイライト（左上） */
  --lo: #ff1493;   /* シャドウ（右下） */
  --win-bg: #ffe6f2;
  --shadow: rgba(255, 20, 147, 0.4);
  --txt: #cc0066;
  --dot: #ff66b2;
  --title-a: #ff007f;
  --title-b: #ffb3d9;
  --title-shadow: #cc0066;
  --btn-bg: #ff99cc;
}

.border-outset {
  border-top: 3px solid var(--hi);
  border-left: 3px solid var(--hi);
  border-right: 3px solid var(--lo);
  border-bottom: 3px solid var(--lo);
}
.border-inset {
  border-top: 3px solid var(--lo);
  border-left: 3px solid var(--lo);
  border-right: 3px solid var(--hi);
  border-bottom: 3px solid var(--hi);
}

.catalog-item {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.label {
  font-size: 14px;
  font-weight: bold;
  color: #aaaaaa;
}

/* ウィンドウ共通ベース */
.moe-window {
  width: 300px;
  background-color: var(--win-bg);
  padding: 3px;
  box-shadow: 0 0 15px var(--shadow);
  position: relative;
  overflow: hidden;
}
.title-bar {
  color: white;
  padding: 3px 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 1px;
  background: linear-gradient(90deg, var(--title-a), var(--title-b));
  text-shadow: 1px 1px var(--title-shadow);
}
.close-btn {
  background-color: var(--btn-bg);
  width: 16px;
  height: 16px;
  font-size: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 中身：パターンあり */
.content-pattern {
  padding: 15px;
  font-size: 14px;
  color: var(--txt);
  text-align: center;
  border: 2px dotted var(--dot);
  margin-top: 3px;
  background-image: radial-gradient(rgba(255,255,255,0.25) 25%, transparent 25%);
  background-position: 0 0, 10px 10px;
  background-size: 20px 20px;
}

/* 空コンテンツ（Unity側で文字を載せる） */
.content-empty {
  height: 100px;
  border: 2px dotted var(--dot);
  margin-top: 3px;
  background-image: radial-gradient(rgba(255,255,255,0.25) 25%, transparent 25%);
  background-position: 0 0, 10px 10px;
  background-size: 20px 20px;
}

/* 入力欄 */
.moe-input {
  background-color: #ffffff;
  width: 250px;
  height: 30px;
  background-image: repeating-linear-gradient(transparent, transparent 2px, rgba(255,255,255,0.0) 3px, rgba(255,255,255,0.0) 3px);
}

/* 吹き出し */
.speech-bubble {
  background-color: var(--win-bg);
  padding: 15px;
  border: 2px dotted var(--dot);
  position: relative;
  width: 200px;
  text-align: center;
  color: var(--txt);
  font-weight: bold;
  box-shadow: 2px 2px 0px var(--lo);
  min-height: 40px;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -15px;
  left: 20px;
  border-width: 15px 15px 0 0;
  border-style: solid;
  border-color: var(--win-bg) transparent transparent transparent;
}
.speech-bubble::before {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 18px;
  border-width: 18px 18px 0 0;
  border-style: solid;
  border-color: var(--dot) transparent transparent transparent;
  z-index: -1;
}

/* ボタン */
.moe-btn {
  background-color: var(--lo);
  color: white;
  padding: 5px 15px;
  font-family: 'MS PGothic', sans-serif;
  font-size: 12px;
  font-weight: bold;
  display: inline-block;
  text-align: center;
  width: 100px;
}

/* プログレスバー */
.progress-bg {
  width: 250px;
  height: 20px;
  background-color: #000000;
}
.progress-fill {
  width: 244px;
  height: 14px;
  background: linear-gradient(90deg, var(--title-a), var(--title-b));
}

/* タイトルアイコン（任意） */
.title-icon{
  display:inline-block;
  width: 14px;
  margin-right:6px;
  text-align:center;
  filter: drop-shadow(1px 1px rgba(0,0,0,0.25));
}


/* ===== Angel テーマ変数 ===== */
:root{
  --hi: #ffffff;
  --lo: #7fe6ff;
  --win-bg: #f7fbff;
  --shadow: rgba(110, 210, 255, 0.22);
  --txt: #0a4a66;
  --dot: rgba(90, 200, 255, 0.8);
  --title-a: #7fe6ff;
  --title-b: #e7f6ff;
  --title-shadow: rgba(255,255,255,0.7);
  --btn-bg: #b9f2ff;
}


.content-pattern,.content-empty{ background-image:
  radial-gradient(rgba(127,230,255,0.25) 18%, transparent 19%),
  linear-gradient(0deg, rgba(255,255,255,0.0), rgba(127,230,255,0.08));
  background-size:16px 16px, 100% 100%;
}
.moe-input{ background-image: repeating-linear-gradient(transparent, transparent 2px, rgba(127,230,255,0.18) 3px, rgba(127,230,255,0.18) 3px); }
.moe-window::after{ content:""; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 2px) 20% 30%/140px 140px,
    radial-gradient(circle, rgba(255,255,255,0.8) 0 1px, transparent 2px) 70% 25%/160px 160px,
    radial-gradient(circle, rgba(255,255,255,0.7) 0 1px, transparent 2px) 55% 80%/190px 190px;
}




/* 種別カラー（Angel） */
.theme-default .title-bar{ background: linear-gradient(90deg, #7fe6ff, #e7f6ff); color:#0a4a66; }
.theme-info    .title-bar{ background: linear-gradient(90deg, #7fffcc, #eafff6); color:#0a4a66; }
.theme-warn    .title-bar{ background: linear-gradient(90deg, #ffd27f, #fff4e0); color:#664200; }
.theme-error   .title-bar{ background: linear-gradient(90deg, #ff7fa0, #ffe0ea); color:#66001e; }
.theme-glitch  { background-color:#001018; box-shadow:0 0 22px rgba(127,230,255,0.35); }
.theme-glitch  .title-bar{ background: repeating-linear-gradient(45deg, #001018, #001018 5px, #7fe6ff 5px, #7fe6ff 10px);
  color:#ffffff; text-shadow:2px 0px #ffffff, -2px 0px #7fe6ff; letter-spacing:-1px; }
.theme-glitch .content-pattern{ background-color:#000a10; border:2px dashed rgba(90,200,255,0.85); color:#bfefff; background-image:none; }

  </style>
</head>
<body>

  <div class="catalog-item">
    <span class="label">汎用ウィンドウ（文字はUnityで乗せる用）</span>
    <div class="moe-window border-outset theme-default">
      <div class="title-bar"><span>†┏┛ A N G E L  Z O N E ┗┓†</span>
        <div class="close-btn border-outset">X</div>
      </div>
      <div class="content-empty"></div>
    </div>
  </div>


  <div class="catalog-item">
    <span class="label">Infoウィンドウ</span>
    <div class="moe-window border-outset theme-info">
      <div class="title-bar"><span>ℹ BLESSING INFO</span>
        <div class="close-btn border-outset">X</div>
      </div>
      <div class="content-empty"></div>
    </div>
  </div>


  <div class="catalog-item">
    <span class="label">Warningウィンドウ</span>
    <div class="moe-window border-outset theme-warn">
      <div class="title-bar"><span>⚠ CAUTION</span>
        <div class="close-btn border-outset">X</div>
      </div>
      <div class="content-empty"></div>
    </div>
  </div>


  <div class="catalog-item">
    <span class="label">Errorウィンドウ</span>
    <div class="moe-window border-outset theme-error">
      <div class="title-bar"><span>❌ DIVINE ERROR</span>
        <div class="close-btn border-outset">X</div>
      </div>
      <div class="content-empty"></div>
    </div>
  </div>


  <div class="catalog-item">
    <span class="label">バグ・グリッチウィンドウ（文字入りサンプル）</span>
    <div class="moe-window border-outset theme-glitch">
      <div class="title-bar"><span>h&2*! A N O M A L Y</span>
        <div class="close-btn border-outset">X</div>
      </div>
      <div class="content-pattern">
0x00000000&lt;br&gt;prayer_failed...&lt;br&gt;anomaly_#%&amp;
</div>
    </div>
  </div>


  <div class="catalog-item">
    <span class="label">入力欄（空）</span>
    <div class="moe-input border-inset"></div>
  </div>


  <div class="catalog-item">
    <span class="label">汎用ボタン（空）</span>
    <div class="moe-btn border-outset"></div>
  </div>


  <div class="catalog-item">
    <span class="label">吹き出し（空）</span>
    <div class="speech-bubble"></div>
  </div>


  <div class="catalog-item">
    <span class="label">プログレスバー（①外枠）</span>
    <div class="progress-bg border-inset"></div>
  </div>


  <div class="catalog-item">
    <span class="label">プログレスバー（②中身）</span>
    <div class="progress-fill"></div>
  </div>

</body>
</html>
